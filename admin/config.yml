backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  # ── ACCUEIL ──────────────────────────────────────────────────────────
  - name: "accueil"
    label: "🏠 Page d'accueil"
    files:
      - label: "Textes hero (bannière principale)"
        name: "hero"
        file: "_data/hero.json"
        fields:
          - { label: "Titre ligne 1", name: "titre1", widget: "string", default: "Ensemble," }
          - { label: "Titre ligne 2 (italique)", name: "titre2", widget: "string", default: "pensons autrement" }
          - { label: "Sous-titre description", name: "soustitre", widget: "text" }
          - { label: "Accroche italique", name: "accroche", widget: "text" }

      - label: "Nos missions"
        name: "missions"
        file: "_data/missions.json"
        fields:
          - label: "Missions"
            name: "items"
            widget: "list"
            fields:
              - { label: "Emoji", name: "emoji", widget: "string" }
              - { label: "Titre", name: "titre", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  # ── AGENDA ───────────────────────────────────────────────────────────
  - name: "evenements"
    label: "📅 Agenda / Événements"
    folder: "_evenements"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "DD/MM/YYYY", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Jour affiché", name: "jour", widget: "string", hint: "Ex: 12 ou Sep" }
      - { label: "Mois affiché", name: "mois", widget: "string", hint: "Ex: Juin ou 2026" }
      - { label: "Catégorie / tag", name: "tag", widget: "string", hint: "Ex: Sensibilisation, Boost'Parents, Événement local" }
      - { label: "Couleur de la carte", name: "couleur", widget: "select", options: ["blanc", "rose", "vert"], default: "blanc" }
      - { label: "Description", name: "body", widget: "text" }
      - { label: "Publié", name: "publie", widget: "boolean", default: true }

  # ── FICHES RESSOURCES ────────────────────────────────────────────────
  - name: "fiches"
    label: "📄 Fiches ressources"
    files:
      - label: "Fiche DYS"
        name: "dys"
        file: "_data/fiche_dys.json"
        fields:
          - { label: "Titre", name: "titre", widget: "string" }
          - { label: "Sous-titre", name: "soustitre", widget: "string" }
          - { label: "Lien PDF (membres)", name: "lien_membre", widget: "string" }
          - { label: "Lien achat unitaire HelloAsso", name: "lien_achat", widget: "string" }
          - { label: "Prix unitaire (€)", name: "prix", widget: "string", default: "5" }

      - label: "Fiche TDAH / TDA"
        name: "tdah"
        file: "_data/fiche_tdah.json"
        fields:
          - { label: "Titre", name: "titre", widget: "string" }
          - { label: "Sous-titre", name: "soustitre", widget: "string" }
          - { label: "Lien PDF (membres)", name: "lien_membre", widget: "string" }
          - { label: "Lien achat unitaire HelloAsso", name: "lien_achat", widget: "string" }
          - { label: "Prix unitaire (€)", name: "prix", widget: "string", default: "5" }

      - label: "Fiche TDAH Adolescence"
        name: "ado"
        file: "_data/fiche_ado.json"
        fields:
          - { label: "Titre", name: "titre", widget: "string" }
          - { label: "Sous-titre", name: "soustitre", widget: "string" }
          - { label: "Lien PDF (membres)", name: "lien_membre", widget: "string" }
          - { label: "Lien achat unitaire HelloAsso", name: "lien_achat", widget: "string" }
          - { label: "Prix unitaire (€)", name: "prix", widget: "string", default: "5" }

      - label: "Fiche TOP"
        name: "top"
        file: "_data/fiche_top.json"
        fields:
          - { label: "Titre", name: "titre", widget: "string" }
          - { label: "Sous-titre", name: "soustitre", widget: "string" }
          - { label: "Lien PDF (membres)", name: "lien_membre", widget: "string" }
          - { label: "Lien achat unitaire HelloAsso", name: "lien_achat", widget: "string" }
          - { label: "Prix unitaire (€)", name: "prix", widget: "string", default: "5" }

      - label: "Fiche HPI"
        name: "hpi"
        file: "_data/fiche_hpi.json"
        fields:
          - { label: "Titre", name: "titre", widget: "string" }
          - { label: "Sous-titre", name: "soustitre", widget: "string" }
          - { label: "Lien PDF (membres)", name: "lien_membre", widget: "string" }
          - { label: "Lien achat unitaire HelloAsso", name: "lien_achat", widget: "string" }
          - { label: "Prix unitaire (€)", name: "prix", widget: "string", default: "5" }

  # ── COMPTES-RENDUS ───────────────────────────────────────────────────
  - name: "comptes_rendus"
    label: "📋 Comptes-rendus de réunion"
    folder: "_comptes_rendus"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string", hint: "Ex: Réunion du bureau — juin 2026" }
      - { label: "Date", name: "date", widget: "datetime", format: "DD/MM/YYYY", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Contenu", name: "body", widget: "markdown" }
      - { label: "Visible membres uniquement", name: "membres_only", widget: "boolean", default: true }
      - { label: "Publié", name: "publie", widget: "boolean", default: true }

  # ── ÉQUIPE ───────────────────────────────────────────────────────────
  - name: "equipe"
    label: "👥 Équipe / Bureau"
    files:
      - label: "Membres du bureau"
        name: "bureau"
        file: "_data/equipe.json"
        fields:
          - label: "Membres"
            name: "membres"
            widget: "list"
            fields:
              - { label: "Nom", name: "nom", widget: "string" }
              - { label: "Rôle", name: "role", widget: "string" }
              - { label: "Bio (survol)", name: "bio", widget: "text" }
              - { label: "Photo (nom du fichier)", name: "photo", widget: "string", hint: "Ex: vanessa.jpg — le fichier doit être dans le dossier images/" }

  # ── ADHÉSION ─────────────────────────────────────────────────────────
  - name: "adhesion"
    label: "🤝 Adhésion"
    files:
      - label: "Liens HelloAsso et tarifs"
        name: "adhesion_links"
        file: "_data/adhesion.json"
        fields:
          - { label: "Lien HelloAsso adhésion 2026-2027", name: "lien_adhesion", widget: "string" }
          - { label: "Tarif famille (€)", name: "tarif_famille", widget: "string", default: "30" }
          - { label: "Tarif individuel (€)", name: "tarif_individuel", widget: "string", default: "15" }
          - { label: "Texte d'introduction", name: "intro", widget: "text" }

  # ── CONTACT ──────────────────────────────────────────────────────────
  - name: "contact"
    label: "✉️ Contact"
    files:
      - label: "Informations de contact"
        name: "contact_info"
        file: "_data/contact.json"
        fields:
          - { label: "Email", name: "email", widget: "string", default: "neuroatypik78@gmail.com" }
          - { label: "Compte Instagram", name: "instagram", widget: "string" }
          - { label: "Ville", name: "ville", widget: "string", default: "Saint-Nom-La-Bretèche (78)" }
